    <style>
        /* Specific Hero positioning for photography details */
        .hero-bg-img {
            object-position: center 20%;
            -webkit-mask-image:

                linear-gradient(to bottom, rgba(0, 0, 0, 1) 85%, rgba(0, 0, 0, 0) 100%);
            -webkit-mask-composite: source-in;
            mask-image:

                linear-gradient(to bottom, rgba(0, 0, 0, 1) 85%, rgba(0, 0, 0, 0) 100%);
            mask-composite: intersect;
        }

        /* Align hero content to the right */
        .hero-content-overlay .section-container {
            display: flex;
            justify-content: flex-end;
            width: 100%;
        }

        .hero-titles {
            margin-right: -15%;
            align-items: flex-end;
            text-align: right;
        }

        /* Style to compensate for transparent padding in trmenung logo */
        .logo-trmenung-hero {
            max-width: 180px !important;
            transform: scale(2.5);
            margin: 3rem -1.5rem !important;
            transform-origin: right center;
        }

        @media (max-width: 992px) {
            .hero-titles {
                margin-right: 0 !important;
                align-items: center !important;
                text-align: center !important;
            }

            .hero-content-overlay .section-container {
                display: flex;
                justify-content: center !important;
                width: 100%;
            }

            .logo-trmenung-hero {
                transform-origin: center center !important;
                margin: 2rem 0 !important;
            }
        }
    </style>

                    grid.appendChild(items[j]);
