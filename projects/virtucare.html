<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtucare | Sururi Ardan</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Alumni+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Antic+Didone&display=swap" rel="stylesheet">
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/transition.css">
    <script src="../script/transition.js" defer></script>
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../fonts/font.css">
    <link rel="icon" type="image/png" href="../assets/logo/sdefault.png">
    <style>
        .coming-soon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--header-height) - 100px);
            text-align: center;
            padding: 6rem 2rem;
            position: relative;
            z-index: 1;
        }

        .cs-star-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(200px, 40vw, 400px);
            height: clamp(200px, 40vw, 400px);
            opacity: 0.05;
            animation: spin 30s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .cs-tagline {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--primary-color);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .cs-title {
            font-family: var(--font-hero-name);
            font-size: clamp(3.5rem, 8vw, 7.5rem);
            font-weight: 900;
            color: var(--text-white);
            text-transform: uppercase;
            line-height: 1;
            letter-spacing: -0.02em;
            filter: drop-shadow(4px 4px 0px #000000);
            margin: 0 0 1.5rem 0;
            transform: skewX(-12deg);
        }

        .cs-status-box {
            background-color: var(--primary-color);
            color: var(--text-white);
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 800;
            text-transform: uppercase;
            padding: 10px 30px;
            border: 4px solid #000000;
            box-shadow: 8px 8px 0px #000000;
            transform: rotate(-3deg) skewX(-10deg);
            margin-bottom: 3.5rem;
            display: inline-block;
        }

        .cs-btn-back {
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <!-- Header / Navigation -->
    <script src="../script/header.js"></script>

    <main>
        <div class="coming-soon-container">
            <!-- Custom P5 Star Icon -->
            <svg class="cs-star-bg" viewBox="0 0 24 24">
                <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" fill="#E52E2E" stroke="#000000" stroke-width="2"/>
            </svg>

            <span class="cs-tagline">3D MODEL & SIMULATION</span>
            <h1 class="cs-title">Virtucare</h1>
            <div class="cs-status-box">COMING SOON - STILL PROCESS ON EDIT</div>
            
            <a href="../project.html" class="btn-primary cs-btn-back">
                BACK TO PROJECTS
                <svg width="8" height="12" viewBox="0 0 8 12" fill="none" xmlns="http://www.w3.org/2000/svg" class="btn-arrow">
                    <path d="M2 2L6 6L2 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </a>
        </div>
    </main>

    <!-- Footer -->
    <script src="../script/footer.js"></script>

    <!-- JavaScript Interactions -->
    <script src="../script/script.js"></script>
</body>

</html>
